function raDecToVec3(raDeg, decDeg, R) {
    const ra = raDeg * Math.PI / 180;
    const dec= decDeg * Math.PI / 180;
    return new THREE.Vector3(
        -R * Math.cos(dec) * Math.cos(ra),
         R * Math.sin(dec),
         R * Math.cos(dec) * Math.sin(ra)
    );
}

function softTex() {
    const c=document.createElement('canvas'); c.width=c.height=64;
    const ctx=c.getContext('2d');
    const g=ctx.createRadialGradient(32,32,0,32,32,32);
    g.addColorStop(0,'rgba(255,255,255,1)');
    g.addColorStop(0.28,'rgba(220,200,255,0.85)');
    g.addColorStop(0.6,'rgba(160,110,240,0.25)');
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g; ctx.fillRect(0,0,64,64);
    return new THREE.CanvasTexture(c);
}

function createSubtleBackground() {
    const geo = new THREE.SphereGeometry(28000, 48, 32);
    const N = geo.attributes.position.count;
    const colors = new Float32Array(N * 3);
    const pos = geo.attributes.position;
    for (let i=0; i<N; i++) {
        const y = pos.getY(i) / 28000; 
        const t = (y + 1) * 0.5; 
        let r, g2, b;
        if (t > 0.5) {
            const f = (t - 0.5) * 2;
            r  = 0.018*(1-f) + 0.005*f;
            g2 = 0.005*(1-f) + 0.030*f;
            b  = 0.065*(1-f) + 0.085*f;
        } else {
            const f = t * 2;
            r  = 0.008*(1-f) + 0.018*f;
            g2 = 0.003*(1-f) + 0.005*f;
            b  = 0.030*(1-f) + 0.065*f;
        }
        colors[i*3]   = r;
        colors[i*3+1] = g2;
        colors[i*3+2] = b;
    }
    geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    const mat = new THREE.MeshBasicMaterial({ vertexColors:true, side:THREE.BackSide });
    bgMesh = new THREE.Mesh(geo, mat);
    scene.add(bgMesh);
}

function init() {
    const container = document.getElementById('canvas-container');
    scene   = new THREE.Scene();
    camera  = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 60000);
    camera.position.set(80, 900, 4200);

    renderer = new THREE.WebGLRenderer({ antialias:true, powerPreference:"high-performance" });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.25;
    container.appendChild(renderer.domElement);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping=true; controls.dampingFactor=0.05;
    controls.maxDistance=22000; controls.minDistance=25;
    controls.enabled=false; controls.target.set(0,20,0);

    raycaster = new THREE.Raycaster();
    mouse     = new THREE.Vector2(-1,-1);

    const tex = softTex();

    createSubtleBackground();
    buildStarfield(tex);
    buildConstellations(tex);
    buildGalaxy(tex);
    buildHeart(tex);
    buildTextSprites();
    for (let i=0;i<4;i++) addShootingStar();

    window.addEventListener('resize', onResize);
    window.addEventListener('mousemove', onMM);
    window.addEventListener('pointermove', onMM);
    window.addEventListener('click', onClick);

    // Touch support for mobile
    window.addEventListener('touchmove', onTouchMove, { passive: true });
    window.addEventListener('touchstart', onTouchStart, { passive: true });
    window.addEventListener('touchend', onTouchEnd, { passive: true });

    // Hide custom cursor on touch devices
    if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
        document.getElementById('custom-cursor-container').style.display = 'none';
        document.body.style.cursor = 'auto';
    }
}

function buildStarfield(tex) {
    const N=45000;
    const pos=[], col=[];
    for (let i=0;i<N;i++) {
        const u=Math.random(), v=Math.random();
        const th=u*2*Math.PI, ph=Math.acos(2*v-1);
        const r=400+Math.random()*24000;
        pos.push(r*Math.sin(ph)*Math.cos(th), r*Math.sin(ph)*Math.sin(th), r*Math.cos(ph));
        const c=new THREE.Color();
        const rn=Math.random();
        if      (rn>0.65) c.setHSL(0.60+Math.random()*0.08, 0.55, 0.80);
        else if (rn>0.35) c.setHSL(0.72+Math.random()*0.06, 0.50, 0.82);
        else              c.setHSL(0.08+Math.random()*0.10, 0.45, 0.80);
        col.push(c.r,c.g,c.b);
    }
    const geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
    geo.setAttribute('color',   new THREE.Float32BufferAttribute(col,3));
    starfield=new THREE.Points(geo, new THREE.PointsMaterial({
        size:1.9, map:tex, vertexColors:true, transparent:true, opacity:0.90,
        blending:THREE.AdditiveBlending, depthWrite:false
    }));
    scene.add(starfield);
}

const CNAMES = Object.keys(CONSTELLATIONS);
function buildConstellations(tex) {
    window.constellationGroup = new THREE.Group();
    interactableConstellations = [];

    CNAMES.forEach(name => {
        const d    = CONSTELLATIONS[name];
        const vecs = d.stars.map(s => raDecToVec3(s.ra, s.dec, d.R * (s.dZ || 1.0)));

        const lp=[];
        d.lines.forEach(([a,b]) => { lp.push(vecs[a].x,vecs[a].y,vecs[a].z, vecs[b].x,vecs[b].y,vecs[b].z); });
        const lGeo=new THREE.BufferGeometry();
        lGeo.setAttribute('position',new THREE.Float32BufferAttribute(lp,3));
        const lMat=new THREE.LineBasicMaterial({ color:d.lc, transparent:true, opacity:0, blending:THREE.AdditiveBlending });
        window.constellationGroup.add(new THREE.LineSegments(lGeo,lMat));

        const dp=[];
        vecs.forEach(v=>dp.push(v.x,v.y,v.z));
        const dGeo=new THREE.BufferGeometry();
        dGeo.setAttribute('position',new THREE.Float32BufferAttribute(dp,3));
        const hMat=new THREE.PointsMaterial({ size:28, map:tex, color:d.dc, transparent:true, opacity:0, blending:THREE.AdditiveBlending, depthWrite:false });
        window.constellationGroup.add(new THREE.Points(dGeo.clone(),hMat));

        const cMat=new THREE.PointsMaterial({ size:7.5, map:tex, color:0xffffff, transparent:true, opacity:0, blending:THREE.AdditiveBlending, depthWrite:false });
        const cPts=new THREE.Points(dGeo,cMat);
        cPts.userData={ name, lineMat:lMat, haloMat:hMat };
        interactableConstellations.push(cPts);
        window.constellationGroup.add(cPts);

        const centroid=new THREE.Vector3();
        vecs.forEach(v=>centroid.add(v)); centroid.divideScalar(vecs.length).multiplyScalar(0.85);
        const lbSpr=makeLabel(name,d.dc);
        lbSpr.position.copy(centroid); lbSpr.scale.set(380,65,1);
        window.constellationGroup.add(lbSpr);
    });

    scene.add(window.constellationGroup);
}

function makeLabel(name, hexCol) {
    const c=document.createElement('canvas'); c.width=512; c.height=96;
    const ctx=c.getContext('2d');
    const r=(hexCol>>16)&0xff, g=(hexCol>>8)&0xff, b=hexCol&0xff;
    ctx.font="300 20px 'Segoe UI',sans-serif";
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillStyle=`rgba(${r},${g},${b},0.75)`;
    ctx.shadowColor=`rgba(${r},${g},${b},0.5)`; ctx.shadowBlur=10;
    ctx.fillText(name,256,48);
    const spr=new THREE.Sprite(new THREE.SpriteMaterial({
        map:new THREE.CanvasTexture(c), transparent:true, opacity:0,
        blending:THREE.AdditiveBlending, depthWrite:false
    }));
    spr.userData={isLabel:true}; return spr;
}

const BASE = {
    "OSA MAYOR": {l:0.06, h:0.04, c:0.35, lb:0.15},
    "ORIÓN":     {l:0.08, h:0.05, c:0.40, lb:0.18},
    "CASIOPEA":  {l:0.05, h:0.03, c:0.30, lb:0.12},
    "ESCORPIO":  {l:0.06, h:0.04, c:0.32, lb:0.14},
    "LEO":       {l:0.04, h:0.03, c:0.28, lb:0.10},
    "CYGNUS":    {l:0.05, h:0.03, c:0.30, lb:0.12},
    "VIRGO":     {l:0.03, h:0.02, c:0.25, lb:0.08}
};
const HOVER = {
    "OSA MAYOR": {l:0.50, h:0.32, c:0.95, lb:0.75},
    "ORIÓN":     {l:0.55, h:0.35, c:0.98, lb:0.80},
    "CASIOPEA":  {l:0.45, h:0.28, c:0.90, lb:0.70},
    "ESCORPIO":  {l:0.48, h:0.30, c:0.92, lb:0.72},
    "LEO":       {l:0.42, h:0.25, c:0.88, lb:0.65},
    "CYGNUS":    {l:0.45, h:0.28, c:0.90, lb:0.70},
    "VIRGO":     {l:0.38, h:0.22, c:0.85, lb:0.60}
};

function buildGalaxy(tex) {
    const N=120000,arms=2,maxR=200;
    const pos=[],col=[];
    for(let i=0;i<N;i++){
        const dist=Math.pow(Math.random(),2.4)*maxR;
        const arm=((i%arms)/arms)*Math.PI*2;
        const ang=dist*0.10, rat=dist/maxR, sp=Math.pow(rat,1.1)*14;
        pos.push(Math.cos(arm+ang)*dist+(Math.random()-.5)*sp,(Math.random()-.5)*(0.5+sp*.04)*(1-rat*.8),Math.sin(arm+ang)*dist+(Math.random()-.5)*sp);
        const c=new THREE.Color();
        if(rat<.10)c.setHSL(0.74,.85,.75);
        else if(rat<.40)c.setHSL(0.70+Math.random()*.04,.90,.70);
        else if(rat<.80)Math.random()>.5?c.setHSL(0.80+Math.random()*.04,.95,.68):c.setHSL(0.64+Math.random()*.03,.90,.72);
        else c.setHSL(0.73,.80,.45);
        col.push(c.r,c.g,c.b);
    }
    const geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
    geo.setAttribute('color',   new THREE.Float32BufferAttribute(col,3));
    galaxyParticles=new THREE.Points(geo,new THREE.PointsMaterial({
        size:1.1,map:tex,vertexColors:true,transparent:true,opacity:0,
        blending:THREE.AdditiveBlending,depthWrite:false
    }));
    scene.add(galaxyParticles);
    window.blackHoleCore=new THREE.Mesh(new THREE.CircleGeometry(6,32),
        new THREE.MeshBasicMaterial({color:0x010003,transparent:true,opacity:0}));
    window.blackHoleCore.rotation.x=-Math.PI/2;
    scene.add(window.blackHoleCore);
}

function buildHeart(tex) {
    const N=7500,yO=55,sc=2.0;
    const pos=[],col=[],tgt=[];
    for(let i=0;i<N;i++){
        const t=Math.random()*Math.PI*2;
        const x=16*Math.pow(Math.sin(t),3);
        const y=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
        const j=(Math.random()-.5)*1.5;
        tgt.push((x+j)*sc,(y+j)*sc+yO,(Math.random()-.5)*5);
        const c=new THREE.Color().setHSL(0.78+Math.random()*.04,.95,.72);
        col.push(c.r,c.g,c.b); pos.push(0,yO,0);
    }
    const geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
    geo.setAttribute('color',   new THREE.Float32BufferAttribute(col,3));
    geo.userData={tgt};
    heartParticles=new THREE.Points(geo,new THREE.PointsMaterial({
        size:1.5,map:tex,vertexColors:true,transparent:true,opacity:0,
        blending:THREE.AdditiveBlending,depthWrite:false
    }));
    scene.add(heartParticles);
}

function buildTextSprites() {
    textGroup=new THREE.Group(); scene.add(textGroup);
    phrases.forEach((ph,i)=>{
        const cv=document.createElement('canvas'); cv.width=512; cv.height=140;
        const ctx=cv.getContext('2d');
        ctx.fillStyle="rgba(10,4,22,0.88)";
        ctx.beginPath(); ctx.roundRect(15,15,482,110,24); ctx.fill();
        ctx.lineWidth=2.5; ctx.strokeStyle="rgba(214,180,252,0.6)"; ctx.stroke();
        ctx.font="Bold 34px 'Segoe UI',sans-serif";
        ctx.fillStyle="#ffffff"; ctx.textAlign="center"; ctx.textBaseline="middle";
        ctx.shadowColor="#e0aaff"; ctx.shadowBlur=14; ctx.fillText(ph,256,70);
        const spr=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(cv),transparent:true,opacity:0}));
        spr.scale.set(0,0,1);
        spr.userData={name:ph,type:"phrase",angle:(i/phrases.length)*Math.PI*2,radius:110+(i%3)*35,orbitalSpeed:0.0015+(i%2)*.0008,vOff:(Math.random()-.5)*20,fsx:25,fsy:6.8};
        textGroup.add(spr); phraseObjects.push(spr);
    });
}

function addShootingStar() {
    const g=new THREE.Group();
    const hM=new THREE.Mesh(new THREE.SphereGeometry(.7,8,8),new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0}));
    const tG=new THREE.ConeGeometry(.5,25,8); tG.rotateX(Math.PI/2); tG.translate(0,0,-12.5);
    const tM=new THREE.Mesh(tG,new THREE.MeshBasicMaterial({color:0xe0aaff,transparent:true,opacity:0,blending:THREE.AdditiveBlending,depthWrite:false}));
    g.add(hM); g.add(tM); scene.add(g);
    shootingStars.push({mesh:g,hM:hM.material,tM:tM.material,active:false,timer:Math.random()*100,life:0,maxLife:0,x:0,y:0,z:0,vx:0,vy:0,vz:0});
}
function triggerStar(s){
    s.active=true;s.life=0;s.maxLife=45+Math.floor(Math.random()*25);
    const sd=Math.random()>.5?1:-1;
    s.x=sd*(300+Math.random()*150);s.y=160+Math.random()*120;s.z=(Math.random()-.5)*400;
    s.vx=-sd*(6+Math.random()*5);s.vy=-(4+Math.random()*4);s.vz=(Math.random()-.5)*3;
    s.mesh.position.set(s.x,s.y,s.z);
    s.mesh.lookAt(new THREE.Vector3(s.x+s.vx,s.y+s.vy,s.z+s.vz));
    s.hM.opacity=1;s.tM.opacity=.7;
}
function tickStars(){
    shootingStars.forEach(s=>{
        if(!s.active){s.timer--;if(s.timer<=0&&timelineStage===4)triggerStar(s);return;}
        s.life++;s.x+=s.vx;s.y+=s.vy;s.z+=s.vz;s.mesh.position.set(s.x,s.y,s.z);
        if(s.life>s.maxLife*.7){const f=(s.life-s.maxLife*.7)/(s.maxLife*.3);s.hM.opacity=1-f;s.tM.opacity=.7*(1-f);}
        if(s.life>=s.maxLife){s.active=false;s.hM.opacity=0;s.tM.opacity=0;s.timer=120+Math.random()*200;}
    });
}

function onMM(e){
    if(e.clientX===undefined)return;
    mouse.x=(e.clientX/innerWidth)*2-1; mouse.y=-(e.clientY/innerHeight)*2+1;
    targetX=e.clientX;targetY=e.clientY;
    if(screenX===-100){screenX=targetX;screenY=targetY;}
}
function getTouchPos(e) {
    const t = e.changedTouches ? e.changedTouches[0] : e.touches[0];
    return t ? { x: t.clientX, y: t.clientY } : null;
}
function onTouchMove(e) {
    const pos = getTouchPos(e);
    if (!pos) return;
    mouse.x = (pos.x / innerWidth) * 2 - 1;
    mouse.y = -(pos.y / innerHeight) * 2 + 1;
    targetX = pos.x; targetY = pos.y;
}
let touchStartPos = null;
function onTouchStart(e) {
    const pos = getTouchPos(e);
    if (!pos) return;
    touchStartPos = { x: pos.x, y: pos.y };
    mouse.x = (pos.x / innerWidth) * 2 - 1;
    mouse.y = -(pos.y / innerHeight) * 2 + 1;
    targetX = pos.x; targetY = pos.y;
    if (screenX === -100) { screenX = targetX; screenY = targetY; }
    // Show hover label on touch
    if (timelineStage === 4) {
        raycaster.setFromCamera(mouse, camera);
        const hph = raycaster.intersectObjects(phraseObjects);
        const hc2 = raycaster.intersectObjects(interactableConstellations);
        if (hph.length > 0) { cardLabel.innerHTML = hph[0].object.userData.name + ' ✦'; document.body.classList.add('cursor-hovering'); }
        else if (hc2.length > 0) { cardLabel.innerHTML = hc2[0].object.userData.name; document.body.classList.add('cursor-hovering'); }
        else document.body.classList.remove('cursor-hovering');
    }
}
function onTouchEnd(e) {
    const pos = getTouchPos(e);
    if (!pos || !touchStartPos) return;
    const dx = Math.abs(pos.x - touchStartPos.x);
    const dy = Math.abs(pos.y - touchStartPos.y);
    // Only trigger click if it was a tap (not a drag/pan)
    if (dx < 12 && dy < 12) {
        mouse.x = (pos.x / innerWidth) * 2 - 1;
        mouse.y = -(pos.y / innerHeight) * 2 + 1;
        onClick();
    }
    document.body.classList.remove('cursor-hovering');
    touchStartPos = null;
}
function onClick(){
    if(timelineStage!==4)return;
    raycaster.setFromCamera(mouse,camera);
    const hp=raycaster.intersectObjects(phraseObjects);
    if(hp.length>0){
        const nm=hp[0].object.userData.name;
        currentName=nm;elTitle.innerText=nm;elText.innerText=phraseNotes[nm]||"…";
        envelopeContainer.classList.add('open');openedMap[nm]=true;
        modalOverlay.classList.add('active');controls.enabled=false;return;
    }
    raycaster.params.Points.threshold=280;
    const hc=raycaster.intersectObjects(interactableConstellations);
    if(hc.length>0){
        const nm=hc[0].object.userData.name;
        currentName=nm;elTitle.innerText=nm;elText.innerText=constellationDedication[nm]||"…";
        if(openedMap[nm])envelopeContainer.classList.add('open');
        else envelopeContainer.classList.remove('open');
        modalOverlay.classList.add('active');controls.enabled=false;
    }
}
function handleEnvelopeInteraction(e){
    e.stopPropagation();
    if(!envelopeContainer.classList.contains('open')){envelopeContainer.classList.add('open');openedMap[currentName]=true;}
}
function closeEnvelope(e){
    e.stopPropagation();modalOverlay.classList.remove('active');
    setTimeout(()=>{controls.enabled=true;},300);
}
function startCinematic(){
    const el=document.getElementById('intro-screen');
    el.style.opacity='0';setTimeout(()=>el.style.display='none',400);
    timelineStage=1;stageStartTime=performance.now();
}
function onResize(){
    camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
}

function animate(){
    requestAnimationFrame(animate);
    const now=performance.now(), el=now-stageStartTime;

    screenX+=(targetX-screenX)*.25;screenY+=(targetY-screenY)*.25;
    pointer.style.left=screenX+'px';pointer.style.top=screenY+'px';
    const cw=190,hov=document.body.classList.contains('cursor-hovering');
    const sc=hov?1:.8;
    let tx=`translate(20px,-50px) scale(${sc})`;
    if(screenX+cw+20>innerWidth) tx=`translate(-${cw+20}px,-50px) scale(${sc})`;
    if(screenY-45-50<0) tx=tx.replace('-50px','20px');
    cardLabel.style.transform=tx;
    cardLabel.style.left=screenX+'px';cardLabel.style.top=screenY+'px';

    if(timelineStage>0){
        galaxyParticles.rotation.y-=.0006;
        starfield.rotation.y+=.00010;
        if(window.constellationGroup) window.constellationGroup.rotation.y+=.000055;
        if(bgMesh) bgMesh.rotation.y+=.000030;
    }

    if(timelineStage===1){
        const pg=Math.min(el/CINEMATIC_DUR,1);
        if(pg<.85){
            starfield.material.size=6.5;
            const p=starfield.geometry.attributes.position.array;
            for(let i=2;i<p.length;i+=3){p[i]+=50;if(p[i]>4000)p[i]=-2000;}
            starfield.geometry.attributes.position.needsUpdate=true;
            galaxyParticles.material.opacity=0;
            if(window.constellationGroup)window.constellationGroup.children.forEach(m=>{if(m?.material)m.material.opacity=0;});
        }else{
            const fp=(pg-.85)/.15, ep=1-Math.pow(1-fp,3);
            starfield.material.size=6.5-4.2*ep;
            galaxyParticles.material.opacity=fp*.95;
            if(window.constellationGroup){
                let gi=0;
                CNAMES.forEach(nm=>{
                    const b=BASE[nm];
                    const ch=window.constellationGroup.children;
                    if(ch[gi]?.material)   ch[gi].material.opacity   =fp*b.l;
                    if(ch[gi+1]?.material) ch[gi+1].material.opacity=fp*b.h;
                    if(ch[gi+2]?.material) ch[gi+2].material.opacity=fp*b.c;
                    if(ch[gi+3]?.material) ch[gi+3].material.opacity=fp*b.lb;
                    gi+=4;
                });
            }
        }
        const ge=Math.pow(pg,3);
        camera.position.z=4200-3850*ge;camera.position.y=900*(1-ge)+120;camera.position.x=80*(1-ge);
        camera.lookAt(0,20,0);
        heartParticles.material.opacity=0;
        textGroup.children.forEach(s=>{s.material.opacity=0;});
        if(pg>=1){
            window.blackHoleCore.material.opacity=.95;
            camera.position.set(0,120,350);controls.target.set(0,20,0);controls.enabled=true;
            timelineStage=4;stageStartTime=now;
        }
    }
    else if(timelineStage===4){
        if(heartParticles.material.opacity<.95)heartParticles.material.opacity+=.07;
        const ef=1-Math.pow(1-Math.min(el/1400,1),4);
        const hp2=heartParticles.geometry.attributes.position.array;
        const ht=heartParticles.geometry.userData.tgt;
        const yO=55;
        for(let i=0;i<hp2.length;i+=3){hp2[i]=ht[i]*ef;hp2[i+1]=yO+(ht[i+1]-yO)*ef;hp2[i+2]=ht[i+2]*ef;}
        heartParticles.geometry.attributes.position.needsUpdate=true;
        heartParticles.rotation.y+=.0012;
        const pulse=1+Math.sin(now*.0024)*.025;
        heartParticles.scale.set(pulse,pulse,pulse);

        textGroup.children.forEach((spr,i)=>{
            if(spr.material.opacity<.95)spr.material.opacity+=.04;
            spr.userData.angle-=spr.userData.orbitalSpeed;
            const cr=spr.userData.radius*ef;
            if(spr.scale.x<spr.userData.fsx){spr.scale.x=spr.userData.fsx*ef;spr.scale.y=spr.userData.fsy*ef;}
            spr.position.x=Math.cos(spr.userData.angle)*cr;
            spr.position.z=Math.sin(spr.userData.angle)*cr;
            spr.position.y=(window.blackHoleCore.position.y+15)+spr.userData.vOff+Math.sin(now*.001+i)*2;
        });

        raycaster.setFromCamera(mouse,camera);
        raycaster.params.Points.threshold=280;
        const hc2=raycaster.intersectObjects(interactableConstellations);
        const hovName=hc2.length>0?hc2[0].object.userData.name:null;
        const modal=modalOverlay.classList.contains('active');

        let gi=0;
        const ch=window.constellationGroup.children;
        CNAMES.forEach(nm=>{
            const isH=(nm===hovName)&&!modal;
            const tgt=isH?HOVER[nm]:BASE[nm];
            const lf=isH?.10:.03;
            if(ch[gi]?.material)   ch[gi].material.opacity   +=(tgt.l -ch[gi].material.opacity  )*lf;
            if(ch[gi+1]?.material) ch[gi+1].material.opacity+=(tgt.h -ch[gi+1].material.opacity)*lf;
            if(ch[gi+2]?.material) ch[gi+2].material.opacity+=(tgt.c -ch[gi+2].material.opacity)*lf;
            if(ch[gi+3]?.material) ch[gi+3].material.opacity+=(tgt.lb-ch[gi+3].material.opacity)*lf;
            gi+=4;
        });

        const hph=raycaster.intersectObjects(phraseObjects);
        if(hph.length>0&&!modal){cardLabel.innerHTML=hph[0].object.userData.name+' ✦';document.body.classList.add('cursor-hovering');}
        else if(hovName&&!modal){cardLabel.innerHTML=hovName;document.body.classList.add('cursor-hovering');}
        else document.body.classList.remove('cursor-hovering');
    }

    tickStars();
    if(starfield&&timelineStage!==1)starfield.material.size=1.9+Math.sin(now*.0015)*.20;
    if(controls.enabled)controls.update();
    renderer.render(scene,camera);
}

init(); animate();
</script>
